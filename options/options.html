<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenSnap Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
          <path d="M18.5 5.5l-2 2M5.5 5.5l2 2M5.5 18.5l2-2M18.5 18.5l-2-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
        </svg>
        <span>ScreenSnap</span>
      </div>
      <span class="subtitle" data-i18n="options_title">设置</span>
    </header>

    <form id="settingsForm">
      <!-- Language -->
      <div class="form-group">
        <label class="form-label" data-i18n="options_language">语言</label>
        <select id="languageSelect" class="select-input">
          <option value="auto" data-i18n="options_languageAuto">自动（跟随浏览器）</option>
          <option value="en">English</option>
          <option value="zh_CN">简体中文</option>
        </select>
      </div>

      <!-- Save Format -->
      <div class="form-group">
        <label class="form-label" data-i18n="options_saveFormat">保存格式</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="saveFormat" value="png">
            <span>PNG</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="saveFormat" value="jpg">
            <span>JPG</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="saveFormat" value="webp">
            <span>WebP</span>
          </label>
        </div>
      </div>

      <!-- Image Quality -->
      <div class="form-group" id="qualityGroup">
        <label class="form-label">
          <span data-i18n="options_imageQuality">图片质量</span>
          <span class="quality-value" id="qualityValue">92%</span>
        </label>
        <input type="range" id="imageQuality" class="range-input" min="10" max="100" step="1" value="92">
        <div class="range-labels">
          <span data-i18n="options_qualityLow">低</span>
          <span data-i18n="options_qualityHigh">高</span>
        </div>
      </div>

      <!-- Default Color -->
      <div class="form-group">
        <label class="form-label" data-i18n="options_defaultColor">默认标注颜色</label>
        <div class="color-row">
          <input type="color" id="defaultColor" class="color-input" value="#ef4444">
          <span class="color-hex" id="colorHex">#ef4444</span>
        </div>
      </div>

      <!-- Default Stroke Width -->
      <div class="form-group">
        <label class="form-label" data-i18n="options_defaultStroke">默认线条粗细</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="defaultStrokeWidth" value="2">
            <span class="stroke-demo" style="height:2px"></span>
            <span data-i18n="stroke_thin">细</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="defaultStrokeWidth" value="4">
            <span class="stroke-demo" style="height:4px"></span>
            <span data-i18n="stroke_medium">中</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="defaultStrokeWidth" value="6">
            <span class="stroke-demo" style="height:6px"></span>
            <span data-i18n="stroke_thick">粗</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="defaultStrokeWidth" value="8">
            <span class="stroke-demo" style="height:8px"></span>
            <span data-i18n="stroke_extraThick">特粗</span>
          </label>
        </div>
      </div>

      <!-- Auto Open Preview -->
      <div class="form-group">
        <label class="toggle-label">
          <span data-i18n="options_autoPreview">截图后自动打开预览</span>
          <input type="checkbox" id="autoOpenPreview" class="toggle-input">
          <span class="toggle-switch"></span>
        </label>
      </div>
    </form>

    <div id="toast" class="toast hidden">
      <span id="toastText" data-i18n="options_saved">设置已保存</span>
    </div>
  </div>

  <script src="../utils/i18n.js"></script>
  <script src="../utils/settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
