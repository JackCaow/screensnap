<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="history_title">Screenshot History - ScreenSnap</title>
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
          <path d="M3 8h18" stroke="currentColor" stroke-width="2"/>
        </svg>
        <h1 data-i18n="history_heading">Screenshot History</h1>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="text" class="search-input" data-i18n-placeholder="history_searchPlaceholder" placeholder="Search...">
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" data-i18n="history_filterAll">All</button>
          <button class="filter-tab" data-filter="visible" data-i18n="history_filterVisible">Visible</button>
          <button class="filter-tab" data-filter="fullpage" data-i18n="history_filterFullpage">Full Page</button>
          <button class="filter-tab" data-filter="region" data-i18n="history_filterRegion">Region</button>
        </div>
      </div>
    </header>

    <div class="stats-bar">
      <span id="statsText" class="stats-text"></span>
      <button id="clearAllBtn" class="btn-clear-all hidden" data-i18n="history_clearAll">Clear All</button>
    </div>

    <div id="grid" class="grid"></div>

    <div id="emptyState" class="empty-state hidden">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <h3 data-i18n="history_emptyTitle">No screenshots yet</h3>
      <p data-i18n="history_emptyDesc">Your captured screenshots will appear here</p>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden">
    <span id="toastText"></span>
  </div>

  <script src="../utils/i18n.js"></script>
  <script src="history.js"></script>
</body>
</html>
